    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Firebase Configuration - Hardcoded for standalone use
        const firebaseConfig = window.STATIC_CONFIG || {
            apiKey: "AIzaSyB8MyaeLzigkRCV3QytPJI-KiESzyn8Xic",
            authDomain: "gen-lang-client-0063084408.firebaseapp.com",
            projectId: "gen-lang-client-0063084408",
            storageBucket: "gen-lang-client-0063084408.firebasestorage.app",
            messagingSenderId: "800074576295",
            appId: "1:800074576295:web:5f39df2c21d92c0a638682",
            firestoreDatabaseId: "ai-studio-0cea6727-8f8d-4120-962c-f20166bee96c"
        };

        let db, auth;

        if (!firebaseConfig || firebaseConfig.apiKey === "remixed-api-key") {
            console.warn("Firebase configuration is using placeholders. Please update with your real config.");
        }

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.app().firestore(firebaseConfig.firestoreDatabaseId);
        auth = firebase.auth();

        // Components
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {

            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Modal = ({ selectedCase, onClose }) => {
            if (!selectedCase) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
                        <div className="p-6 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
                            <div className="flex-1 mr-4">
                                <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1 block">Case Details</span>
                                <h2 className="text-xl font-bold text-gray-900">{selectedCase.caseNameCitation}</h2>
                            </div>
                            <button onClick={onClose} className="p-2 rounded-full hover:bg-gray-200 text-gray-400 hover:text-gray-600 transition-all">
                                <Icon name="x" size={20} />
                            </button>
                        </div>
                        
                        <div className="overflow-y-auto p-8 space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <div className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                    <span className="text-[10px] font-semibold uppercase tracking-wider text-gray-400 block mb-1">Petitioner</span>
                                    <p className="text-sm font-medium text-gray-900">{selectedCase.petitioner}</p>
                                </div>
                                <div className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                    <span className="text-[10px] font-semibold uppercase tracking-wider text-gray-400 block mb-1">Respondent</span>
                                    <p className="text-sm font-medium text-gray-900">{selectedCase.respondent}</p>
                                </div>
                                <div className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                    <span className="text-[10px] font-semibold uppercase tracking-wider text-gray-400 block mb-1">Topic & Article Cited</span>
                                    <p className="text-sm font-medium text-gray-900">
                                        {[selectedCase.provisionTopic, selectedCase.articleCited]
                                            .filter(val => val && String(val).trim() !== '')
                                            .map(val => String(val).trim())
                                            .join(' | ') || '—'}
                                    </p>
                                </div>
                            </div>

                            <section>
                                <h3 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                    <div className="w-1 h-4 bg-black rounded-full"></div>
                                    Facts
                                </h3>
                                <div className="p-5 bg-gray-50 rounded-2xl border border-gray-100">
                                    <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{selectedCase.facts}</p>
                                </div>
                            </section>

                            <section>
                                <h3 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                    <div className="w-1 h-4 bg-black rounded-full"></div>
                                    Issue (Succession)
                                </h3>
                                <div className="p-5 bg-indigo-50/30 rounded-2xl border border-indigo-100/50">
                                    <p className="text-sm text-indigo-900 leading-relaxed font-medium">{selectedCase.issueSuccession}</p>
                                </div>
                            </section>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="p-5 border border-gray-100 rounded-2xl">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">RTC Decision</span>
                                    <p className="text-sm text-gray-600 leading-relaxed">{selectedCase.rtcDecision}</p>
                                </div>
                                <div className="p-5 border border-gray-100 rounded-2xl">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400 block mb-2">CA Decision</span>
                                    <p className="text-sm text-gray-600 leading-relaxed">{selectedCase.caDecision}</p>
                                </div>
                                <div className="p-5 bg-emerald-50/30 border border-emerald-100/50 rounded-2xl">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-emerald-600 block mb-2">SC Ruling</span>
                                    <p className="text-sm text-emerald-900 font-medium leading-relaxed">{selectedCase.scRuling}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <section>
                                    <h3 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                        <div className="w-1 h-4 bg-black rounded-full"></div>
                                        Rationale
                                    </h3>
                                    <div className="p-5 bg-gray-50 rounded-2xl border border-gray-100">
                                        <p className="text-sm text-gray-700 leading-relaxed">{selectedCase.rationaleBasis}</p>
                                    </div>
                                </section>
                                <section>
                                    <h3 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                        <div className="w-1 h-4 bg-black rounded-full"></div>
                                        Simple Explanation
                                    </h3>
                                    <div className="p-5 bg-amber-50/30 rounded-2xl border border-amber-100/50">
                                        <p className="text-sm text-amber-900 leading-relaxed italic">{selectedCase.simpleExplanation}</p>
                                    </div>
                                </section>
                            </div>

                            <section>
                                <h3 className="text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                    <div className="w-1 h-4 bg-black rounded-full"></div>
                                    Full Digest
                                </h3>
                                <div className="p-6 bg-gray-50 rounded-2xl border border-gray-100">
                                    <div className="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap">{selectedCase.fullDigest}</div>
                                </div>
                            </section>
                        </div>

                        <div className="p-6 bg-gray-50 border-t border-gray-100 flex justify-end">
                            <button onClick={onClose} className="px-6 py-2 text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">Close</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [cases, setCases] = useState([]);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [provisionFilter, setProvisionFilter] = useState('All');
            const [caseNameFilter, setCaseNameFilter] = useState('All');
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(10);
            const [selectedCase, setSelectedCase] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: 'id', direction: 'asc' });
            const [status, setStatus] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged((u) => {
                    setUser(u);
                });

                const unsubscribeData = db.collection('cases').onSnapshot((snapshot) => {
                    const casesData = [];
                    snapshot.forEach((doc) => {
                        casesData.push({ id: doc.id, ...doc.data() });
                    });
                    setCases(casesData);
                    setIsLoading(false);
                }, (error) => {
                    console.error("Firestore error:", error);
                    setIsLoading(false);
                });

                return () => {
                    unsubscribeAuth();
                    unsubscribeData();
                };
            }, []);

            const handleLogin = () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(err => {
                    console.error("Login Error:", err);
                    setStatus({ message: "Login failed: " + err.message, type: 'error' });
                });
            };

            const handleLogout = () => auth.signOut();

            const provisions = useMemo(() => {
                const unique = new Set();
                cases.forEach(c => {
                    if (c.provisionTopic) unique.add(String(c.provisionTopic).trim());
                    if (c.articleCited) unique.add(String(c.articleCited).trim());
                });
                return ['All', ...Array.from(unique).sort()];
            }, [cases]);

            const caseNames = useMemo(() => {
                const unique = new Set(cases.map(c => c.caseNameCitation).filter(v => v));
                return ['All', ...Array.from(unique).sort()];
            }, [cases]);

            const filteredData = useMemo(() => {
                const searchLower = searchTerm.toLowerCase().trim();
                let result = cases.filter(item => {
                    const matchesSearch = searchLower === '' || 
                        String(item.caseNameCitation || '').toLowerCase().includes(searchLower) ||
                        String(item.issueSuccession || '').toLowerCase().includes(searchLower) ||
                        String(item.provisionTopic || '').toLowerCase().includes(searchLower) ||
                        String(item.articleCited || '').toLowerCase().includes(searchLower);
                    const matchesProvision = provisionFilter === 'All' || item.provisionTopic === provisionFilter || item.articleCited === provisionFilter;
                    const matchesCaseName = caseNameFilter === 'All' || item.caseNameCitation === caseNameFilter;
                    return matchesSearch && matchesProvision && matchesCaseName;
                });

                if (sortConfig) {
                    result.sort((a, b) => {
                        let valA, valB;
                        if (sortConfig.key === 'id') {
                            valA = parseInt(a.id, 10) || 0;
                            valB = parseInt(b.id, 10) || 0;
                        } else {
                            valA = String(a[sortConfig.key] || '').toLowerCase();
                            valB = String(b[sortConfig.key] || '').toLowerCase();
                        }
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [cases, searchTerm, provisionFilter, caseNameFilter, sortConfig]);

            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            const paginatedData = filteredData.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig && sortConfig.key === key && sortConfig.direction === 'asc') {
                    direction = 'desc';
                }
                setSortConfig({ key, direction });
            };

            const clearDatabase = async () => {
                if (!confirm("Are you sure you want to clear the entire database?")) return;
                setStatus({ message: "Clearing database...", type: 'info' });
                try {
                    const snapshot = await db.collection('cases').get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    setStatus({ message: "Database cleared successfully", type: 'success' });
                    setTimeout(() => setStatus(null), 3000);
                } catch (err) {
                    setStatus({ message: "Clear failed: " + err.message, type: 'error' });
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const data = evt.target.result;
                    let importedData = [];

                    if (file.name.endsWith('.csv')) {
                        Papa.parse(data, {
                            header: true,
                            complete: (results) => {
                                saveToFirestore(results.data);
                            }
                        });
                    } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const sheetName = workbook.SheetNames[0];
                        const sheet = workbook.Sheets[sheetName];
                        importedData = XLSX.utils.sheet_to_json(sheet);
                        saveToFirestore(importedData);
                    }
                };

                if (file.name.endsWith('.csv')) {
                    reader.readAsText(file);
                } else {
                    reader.readAsBinaryString(file);
                }
            };

            const saveToFirestore = async (data) => {
                setStatus({ message: `Importing ${data.length} cases...`, type: 'info' });
                try {
                    const batch = db.batch();
                    data.forEach(item => {
                        if (!item.caseNameCitation) return;
                        const ref = db.collection('cases').doc();
                        batch.set(ref, {
                            ...item,
                            updatedAt: new Date().toISOString(),
                            updatedBy: user?.email || 'anonymous'
                        });
                    });
                    await batch.commit();
                    setStatus({ message: "Import successful", type: 'success' });
                    setTimeout(() => setStatus(null), 3000);
                } catch (err) {
                    setStatus({ message: "Import failed: " + err.message, type: 'error' });
                }
            };

            const exportToExcel = () => {
                const worksheet = XLSX.utils.json_to_sheet(cases);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Cases");
                XLSX.writeFile(workbook, "Legal_Cases_Export.xlsx");
            };

            const exportToCSV = () => {
                const csv = Papa.unparse(cases);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                saveAs(blob, "Legal_Cases_Export.csv");
            };

            const exportToWord = async () => {
                const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType, AlignmentType, TextRun, BorderStyle } = docx;
                
                const rows = [
                    new TableRow({
                        children: [
                            new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "No.", bold: true })] })] }),
                            new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "Case Name", bold: true })] })] }),
                            new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "Provision", bold: true })] })] }),
                            new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "SC Ruling", bold: true })] })] }),
                        ],
                    }),
                ];

                cases.forEach((c) => {
                    rows.push(
                        new TableRow({
                            children: [
                                new TableCell({ children: [new Paragraph(String(c.id || ''))] }),
                                new TableCell({ children: [new Paragraph(String(c.caseNameCitation || ''))] }),
                                new TableCell({ children: [new Paragraph(String(c.provisionTopic || ''))] }),
                                new TableCell({ children: [new Paragraph(String(c.scRuling || ''))] }),
                            ],
                        })
                    );
                });

                const doc = new Document({
                    sections: [{
                        properties: {},
                        children: [
                            new Paragraph({
                                children: [new TextRun({ text: "Legal Case Repository Export", bold: true, size: 32 })],
                                alignment: AlignmentType.CENTER,
                                spacing: { after: 400 },
                            }),
                            new Table({
                                width: { size: 100, type: WidthType.PERCENTAGE },
                                rows: rows,
                            }),
                        ],
                    }],
                });

                const blob = await Packer.toBlob(doc);
                saveAs(blob, "Legal_Cases_Export.docx");
            };

            return (
                <div className="min-h-screen bg-[#F8F9FA] p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-8">
                        {/* Status Bar */}
                        {status && (
                            <div className={`fixed top-4 right-4 z-[100] p-4 rounded-2xl shadow-2xl border ${
                                status.type === 'error' ? 'bg-red-50 border-red-100 text-red-800' : 
                                status.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' : 
                                'bg-blue-50 border-blue-100 text-blue-800'
                            }`}>
                                <div className="flex items-center gap-3">
                                    <Icon name={status.type === 'error' ? 'alert-circle' : 'check'} size={18} />
                                    <p className="text-sm font-medium">{status.message}</p>
                                </div>
                            </div>
                        )}

                        {/* Header */}
                        <header className="flex flex-col md:flex-row md:items-end justify-between gap-6">
                            <div className="space-y-1">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-10 h-10 bg-[#1A1A1A] rounded-xl flex items-center justify-center shadow-lg shadow-black/10">
                                        <Icon name="scale" size={20} className="text-white" />
                                    </div>
                                    <h1 className="text-3xl font-bold tracking-tight text-[#1A1A1A]">Succession</h1>
                                </div>
                                <p className="text-sm text-gray-500 font-medium">Complete Legal Case Repository</p>
                                <p className="text-[10px] text-gray-400 font-mono uppercase tracking-widest">Live Firestore Database</p>
                            </div>

                            <div className="flex items-center gap-3">
                                {user ? (
                                    <div className="flex items-center gap-4">
                                        <div className="flex flex-col items-end">
                                            <span className="text-xs font-bold text-gray-900">{user.displayName || 'Admin'}</span>
                                            <span className="text-[10px] text-emerald-600 font-bold uppercase tracking-tighter">Authenticated</span>
                                        </div>
                                        <button onClick={handleLogout} className="p-2.5 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 text-gray-500 hover:text-red-600 transition-all shadow-sm">
                                            <Icon name="log-out" size={18} />
                                        </button>
                                    </div>
                                ) : (
                                    <button onClick={handleLogin} className="flex items-center gap-2 px-5 py-2.5 bg-black text-white rounded-xl hover:bg-gray-800 transition-all shadow-lg shadow-black/10 font-semibold text-sm">
                                        <Icon name="log-in" size={18} />
                                        Sign In
                                    </button>
                                )}
                            </div>
                        </header>

                        {/* Admin Controls */}
                        {user && (
                            <div className="p-6 bg-white rounded-3xl border border-gray-100 shadow-sm flex flex-wrap items-center justify-between gap-4">
                                <div className="flex items-center gap-4">
                                    <button 
                                        onClick={() => fileInputRef.current?.click()}
                                        className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-xl hover:bg-indigo-100 transition-all text-sm font-bold"
                                    >
                                        <Icon name="upload" size={16} />
                                        Import CSV/XLSX
                                    </button>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".csv,.xlsx,.xls" />
                                    
                                    <button 
                                        onClick={clearDatabase}
                                        className="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-700 rounded-xl hover:bg-red-100 transition-all text-sm font-bold"
                                    >
                                        <Icon name="trash-2" size={16} />
                                        Clear DB
                                    </button>
                                </div>

                                <div className="flex items-center gap-3">
                                    <span className="text-xs font-bold text-gray-400 uppercase tracking-widest mr-2">Export:</span>
                                    <button onClick={exportToExcel} className="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-100 transition-all">
                                        <Icon name="table" size={18} />
                                    </button>
                                    <button onClick={exportToCSV} className="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-100 transition-all">
                                        <Icon name="file-text" size={18} />
                                    </button>
                                    <button onClick={exportToWord} className="p-2 bg-gray-50 text-gray-600 rounded-lg hover:bg-gray-100 transition-all">
                                        <Icon name="file-type" size={18} />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Search & Filters */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 items-end">
                            <div className="lg:col-span-6 relative group">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-black transition-colors">
                                    <Icon name="search" size={18} />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="Search by case name, issue, or provision..."
                                    value={searchTerm}
                                    onChange={(e) => { setSearchTerm(e.target.value); setCurrentPage(1); }}
                                    className="w-full pl-12 pr-4 py-3.5 bg-white border border-gray-200 rounded-2xl text-sm focus:outline-none focus:ring-4 focus:ring-black/5 focus:border-black transition-all shadow-sm"
                                />
                            </div>
                            <div className="lg:col-span-3 relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <Icon name="filter" size={14} />
                                </div>
                                <select 
                                    value={provisionFilter}
                                    onChange={(e) => { setProvisionFilter(e.target.value); setCurrentPage(1); }}
                                    className="w-full pl-10 pr-4 py-3.5 bg-white border border-gray-200 rounded-2xl text-sm appearance-none focus:outline-none focus:ring-4 focus:ring-black/5 focus:border-black transition-all shadow-sm"
                                >
                                    <option value="All">All Provisions</option>
                                    {provisions.filter(p => p !== 'All').map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                            <div className="lg:col-span-3 relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <Icon name="book-open" size={14} />
                                </div>
                                <select 
                                    value={caseNameFilter}
                                    onChange={(e) => { setCaseNameFilter(e.target.value); setCurrentPage(1); }}
                                    className="w-full pl-10 pr-4 py-3.5 bg-white border border-gray-200 rounded-2xl text-sm appearance-none focus:outline-none focus:ring-4 focus:ring-black/5 focus:border-black transition-all shadow-sm"
                                >
                                    <option value="All">All Case Names</option>
                                    {caseNames.filter(c => c !== 'All').map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="bg-white rounded-3xl border border-gray-100 shadow-xl shadow-black/[0.02] overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50/50 border-bottom border-gray-100">
                                            <th onClick={() => handleSort('id')} className="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-gray-500 cursor-pointer hover:text-black transition-colors">
                                                <div className="flex items-center gap-2">No. <Icon name="arrow-up-down" size={12} /></div>
                                            </th>
                                            <th onClick={() => handleSort('caseNameCitation')} className="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-gray-500 cursor-pointer hover:text-black transition-colors">
                                                <div className="flex items-center gap-2">Case Name <Icon name="arrow-up-down" size={12} /></div>
                                            </th>
                                            <th onClick={() => handleSort('provisionTopic')} className="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-gray-500 cursor-pointer hover:text-black transition-colors">
                                                <div className="flex items-center gap-2">Provision <Icon name="arrow-up-down" size={12} /></div>
                                            </th>
                                            <th className="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-gray-500">SC Ruling</th>
                                            <th className="px-6 py-4 text-xs font-semibold uppercase tracking-wider text-gray-500">Simple Explanation</th>
                                            <th className="px-6 py-4 text-right"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-50">
                                        {isLoading ? (
                                            <tr><td colSpan="6" className="px-6 py-12 text-center text-gray-400">Loading cases...</td></tr>
                                        ) : paginatedData.length === 0 ? (
                                            <tr><td colSpan="6" className="px-6 py-12 text-center text-gray-400">No cases found matching your filters.</td></tr>
                                        ) : paginatedData.map((item) => (
                                            <tr key={item.id} className="hover:bg-gray-50/50 transition-colors group">
                                                <td className="px-6 py-4 text-sm font-medium text-gray-400">{item.id}</td>
                                                <td className="px-6 py-4 text-sm font-semibold text-gray-900">{item.caseNameCitation}</td>
                                                <td className="px-6 py-4 text-sm text-gray-600">
                                                    {[item.provisionTopic, item.articleCited].filter(v => v).join(' | ') || '—'}
                                                </td>
                                                <td className="px-6 py-4 text-sm text-gray-600 line-clamp-2 max-w-xs">{item.scRuling}</td>
                                                <td className="px-6 py-4 text-sm text-gray-500 italic line-clamp-2 max-w-xs">{item.simpleExplanation}</td>
                                                <td className="px-6 py-4 text-right">
                                                    <button onClick={() => setSelectedCase(item)} className="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs font-semibold text-gray-700 hover:bg-gray-50 transition-all">Details</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {/* Pagination */}
                            <div className="px-6 py-4 bg-gray-50/50 border-t border-gray-100 flex items-center justify-between">
                                <p className="text-xs text-gray-500">
                                    Showing <span className="font-medium text-gray-900">{filteredData.length === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1}</span> to <span className="font-medium text-gray-900">{Math.min(filteredData.length, currentPage * itemsPerPage)}</span> of <span className="font-medium text-gray-900">{filteredData.length}</span> results
                                </p>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="p-1.5 rounded-lg border border-gray-200 bg-white disabled:opacity-50"><Icon name="chevron-left" size={16} /></button>
                                    <div className="flex items-center gap-1 px-2">
                                        <span className="text-xs font-bold text-gray-900">{currentPage}</span>
                                        <span className="text-xs text-gray-400">/</span>
                                        <span className="text-xs text-gray-400">{totalPages || 1}</span>
                                    </div>
                                    <button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages || totalPages === 0} className="p-1.5 rounded-lg border border-gray-200 bg-white disabled:opacity-50"><Icon name="chevron-right" size={16} /></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <Modal selectedCase={selectedCase} onClose={() => setSelectedCase(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
