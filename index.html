                            ]
                        })
                    );
                });

                const doc = new Document({
                    sections: [{
                        properties: { type: SectionType.CONTINUOUS },
                        children: children
                    }]
                });

                const saveAs = window.saveAs || ((b, n) => {

                    a.href = url;
                    a.download = n;

        // Import
        importBtn.addEventListener('click', () => fileInput.click());

            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const content = event.target.result;
                    let data = [];
                    
                    if (file.name.endsWith('.json')) {
                        data = JSON.parse(content);
                    } else if (file.name.endsWith('.csv')) {
                        const lines = content.split('\n');
                        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                        data = lines.slice(1).filter(l => l.trim()).map(line => {
                            const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
                            const obj = {};
                            headers.forEach((h, i) => {
                                const header = h.toLowerCase();
                                if (header.includes('case') || header.includes('title')) obj.caseNameCitation = values[i];
                                if (header.includes('provision') || header.includes('topic')) obj.provisionTopic = values[i];
                                if (header.includes('issue')) obj.issueSuccession = values[i];
                                if (header.includes('ruling')) obj.scRuling = values[i];
                                if (header.includes('rationale')) obj.rationaleBasis = values[i];
                                if (header.includes('petitioner')) obj.petitioner = values[i];
                                if (header.includes('respondent')) obj.respondent = values[i];
                                if (header.includes('explanation')) obj.simpleExplanation = values[i];
                            });
                            return obj;
                        });
                    }

                    if (!Array.isArray(data)) throw new Error('Invalid data format');

                    const batch = writeBatch(db);
                    data.forEach(item => {
                        const newDoc = doc(collection(db, "cases"));
                        batch.set(newDoc, {
                            ...item,
                            createdAt: serverTimestamp(),
                            updatedAt: serverTimestamp()
                        });
                    });
                    await batch.commit();
                    showNotification(`Successfully imported ${data.length} cases.`);
                } catch (error) {
                    showNotification('Error importing data: ' + error.message);
                }
                fileInput.value = '';
            };
            reader.readAsText(file);
        });

            if (sort === 'oldest') {

        async function downloadCurrentCase() {
            if (!selectedCase) return;
            const item = selectedCase;
            const filename = (item.caseNameCitation || item.title || 'Case_Details').replace(/[^a-z0-9]/gi, '_').substring(0, 50);
            
            const docxLib = window.docx || (typeof docx !== 'undefined' ? docx : null);
            
            if (!docxLib) {
                console.warn("docx library not loaded, falling back to legacy export for single case");
                exportToWordLibraryLess([item], filename);
                return;
            }

            try {
                showNotification('Generating document...', 'info');
                const { Document, Paragraph, TextRun, HeadingLevel, AlignmentType, Packer, SectionType, Table, TableRow, TableCell, WidthType } = docxLib;

                const combinedTopic = [item.provisionTopic, item.articleCited, item.provision]
                    .filter(val => val && String(val).trim() !== '')
                    .map(val => String(val).trim())
                    .join(' | ');

                const doc = new Document({
                    sections: [{
                        properties: { type: SectionType.CONTINUOUS },
                        children: [
                            new Paragraph({
                                text: `CASE BRIEF: ${item.caseNameCitation || item.title || 'Untitled Case'}`,
                                heading: HeadingLevel.TITLE,
                                alignment: AlignmentType.CENTER,
                                spacing: { after: 400 }
                            }),
                            new Table({
                                width: { size: 100, type: WidthType.PERCENTAGE },
                                rows: [
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Petitioner", bold: true })] }), new TableCell({ children: [new Paragraph(item.petitioner || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Respondent", bold: true })] }), new TableCell({ children: [new Paragraph(item.respondent || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Provisions", bold: true })] }), new TableCell({ children: [new Paragraph(item.provisions || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Topic & Article", bold: true })] }), new TableCell({ children: [new Paragraph(combinedTopic)] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Facts", bold: true })] }), new TableCell({ children: [new Paragraph(item.facts || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Issue (Succession)", bold: true })] }), new TableCell({ children: [new Paragraph(item.issueSuccession || item.issues || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "RTC Decision", bold: true })] }), new TableCell({ children: [new Paragraph(item.rtcDecision || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "CA Decision", bold: true })] }), new TableCell({ children: [new Paragraph(item.caDecision || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "SC Ruling", bold: true })] }), new TableCell({ children: [new Paragraph(item.scRuling || item.ruling || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Rationale / Basis", bold: true })] }), new TableCell({ children: [new Paragraph(item.rationaleBasis || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Simple Explanation", bold: true })] }), new TableCell({ children: [new Paragraph(item.simpleExplanation || "—")] }) ] }),
                                    new TableRow({ children: [ new TableCell({ children: [new Paragraph({ text: "Full Digest", bold: true })] }), new TableCell({ children: [new Paragraph(item.fullDigest || item.digest || "—")] }) ] }),
                                ]
                            })
                        ]
                    }]
                });

                const blob = await Packer.toBlob(doc);
                const saveAs = window.saveAs || ((b, n) => {
                    const url = URL.createObjectURL(b);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = n;
                    a.click();
                    URL.revokeObjectURL(url);
                });
                saveAs(blob, `${(item.caseNameCitation || item.title || 'case').replace(/[^a-z0-9]/gi, '_').toLowerCase()}_brief.docx`);
                showNotification('Doc Downloaded successfully.');
            } catch (error) {
                console.error("Download error:", error);
                showNotification('Error generating Doc: ' + error.message);
            }
        }

        // Pagination Event Listeners
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                render();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredCount / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                render();
            }
        });

        document.getElementById('rowsPerPage').addEventListener('change', (e) => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            render();
        });

        // Event Listeners
        searchInput.addEventListener('input', () => {
            currentPage = 1;
            render();
        });
        provisionFilter.addEventListener('change', () => {
            currentPage = 1;
            render();
        });
        sortOrder.addEventListener('change', () => {
            currentPage = 1;
            render();
        });

        // Initialize Lucide
        lucide.createIcons();
    </script>
</body>
</html>
